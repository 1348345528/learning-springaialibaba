spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://localhost:3306/rag_knowledgebase?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai

server:
  port: 8084

jwt:
  secret: mySecretKeyForJWTTokenGenerationAndValidation2026!Secure
  expiration: 86400000 # 24 hours in milliseconds

logging:
  level:
    com.example.auth: DEBUG
