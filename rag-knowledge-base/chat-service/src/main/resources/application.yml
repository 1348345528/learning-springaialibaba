server:
  port: 8083
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
spring:
  ai:
    dashscope:
      api-key: sk-9259cd2c369d4dfaa44ce71fd8b9f67e
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
  # Redis Configuration (L1 Cache)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
  # MySQL Configuration (L2 Persistence)
  datasource:
    url: jdbc:mysql://localhost:3306/rag_knowledgebase?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  http:
    encoding:
      charset: UTF-8
      enabled: true

jwt:
  secret: mySecretKeyForJWTTokenGenerationAndValidation2026!Secure

rag:
  service:
    base-url: http://localhost:8081

# Agent State TTL Configuration
agent:
  state:
    ttl-hours: 12
