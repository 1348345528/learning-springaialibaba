server:
  port: 8081
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/rag_knowledgebase?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
app:
  rag-service-url: http://localhost:8082
