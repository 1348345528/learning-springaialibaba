spring.application.name=mcp-server-example

server.port=8085

# MCP Server identity
spring.ai.mcp.server.name=mcp-server-example
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.instructions=Provides user management and calculator tools for AI assistants

# Capabilities — enable only what we need
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=false
spring.ai.mcp.server.capabilities.prompt=false

# SSE transport (WebFlux)
spring.ai.mcp.server.transport=SSE
spring.ai.mcp.server.sse-endpoint=/sse
spring.ai.mcp.server.sse-message-endpoint=/mcp/message
